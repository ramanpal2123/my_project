{% extends 'base.html' %}
{% block title %}Delete Task{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow border-danger">
      <div class="card-body p-5 text-center">

        <div style="font-size: 3.5rem;">🗑️</div>
        <h4 class="fw-bold mt-3 mb-2">Delete Task?</h4>
        <p class="text-muted mb-1">You are about to delete:</p>
        <p class="fw-bold text-danger fs-5">"{{ task.title }}"</p>
        <p class="text-muted small">This action cannot be undone.</p>

        <form method="POST" class="mt-4">
          {% csrf_token %}
          <div class="d-flex gap-2 justify-content-center">
            <button type="submit" class="btn btn-danger btn-lg px-4">Yes, Delete</button>
            <a href="{% url 'task_list' %}" class="btn btn-outline-secondary btn-lg px-4">Cancel</a>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
