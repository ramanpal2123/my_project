<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MyApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-card { background: #fff; border-radius: 16px; border: 0.5px solid #e5e5e5; padding: 40px; width: 100%; max-width: 420px; }
    .auth-logo { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    .auth-logo b { color: #7f77dd; }
    .auth-subtitle { color: #888; font-size: 14px; margin-bottom: 28px; }
    .field-label { font-size: 13px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
    .auth-input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 0.5px solid #ddd; font-size: 14px; outline: none;
      transition: border-color 0.15s; background: #fafafa;
    }
    .auth-input:focus { border-color: #7f77dd; background: #fff; }
    .auth-btn {
      width: 100%; padding: 11px; border-radius: 8px;
      background: #7f77dd; color: #fff; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      margin-top: 8px; transition: background 0.15s;
    }
    .auth-btn:hover { background: #6c64c8; }
    .auth-link { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
    .auth-link a { color: #7f77dd; text-decoration: none; font-weight: 600; }
    .field-error { color: #A32D2D; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">My<b>App</b></div>
    <div class="auth-subtitle">Welcome back! Login to your account.</div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger py-2 mb-3" style="font-size:13px">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div style="margin-bottom:16px">
        <div class="field-label">Username</div>
        <input type="text" name="username" class="auth-input"
               placeholder="Enter your username" required>
      </div>

      <div style="margin-bottom:20px">
        <div class="field-label">Password</div>
        <input type="password" name="password" class="auth-input"
               placeholder="Enter your password" required>
      </div>

      <button type="submit" class="auth-btn">Login</button>
    </form>

    <div class="auth-link">
      Don't have an account? <a href="{% url 'signup' %}">Sign up</a>
    </div>
  </div>
</div>
</body>
</html>
